# Development Configuration
server.port=8080

# Kafka Development Configuration
spring.kafka.bootstrap-servers=localhost:9092

# Email Configuration - Use console logging for development
# To test actual email sending, configure with your credentials
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:test@example.com}
spring.mail.password=${EMAIL_PASSWORD:test-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# SMS Provider Configuration - Mock for development
sms.provider.name=mock
sms.provider.api-key=dev-api-key
sms.provider.api-url=http://localhost:8081/sms
sms.provider.sender-id=DevNotificationSystem

# Consumer Retry Configuration - More aggressive in dev for testing
kafka.consumer.retry.max-attempts=3
kafka.consumer.retry.backoff-initial=500
kafka.consumer.retry.backoff-multiplier=2.0
kafka.consumer.retry.backoff-max=5000

# Database Configuration - H2 in-memory for development
spring.datasource.url=jdbc:h2:mem:notificationdb_dev
spring.jpa.show-sql=true
spring.h2.console.enabled=true

# Development Logging
logging.level.com.example.notification=DEBUG
logging.level.org.springframework.kafka=DEBUG
logging.level.org.springframework.mail=DEBUG
